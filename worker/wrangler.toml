name = "ensaio-proxy"
main = "index.js"
compatibility_date = "2024-09-23"

# Após criar o namespace KV com `wrangler kv namespace create RATE_LIMIT_KV`,
# substitua PLACEHOLDER_KV_ID pelo ID retornado pelo comando.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "PLACEHOLDER_KV_ID"

# A chave da Anthropic é configurada como secret (nunca vai neste arquivo):
# wrangler secret put ANTHROPIC_KEY
